<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Don't Wake the Monster! V2</title>
<style>
body{font-family:Arial;background:#111;color:#fff;text-align:center;margin:0;padding:20px}
.card{max-width:700px;margin:auto;background:#222;padding:20px;border-radius:16px}
button{padding:12px 18px;font-size:18px;border:none;border-radius:10px;background:#53d769;color:#000;cursor:pointer}
#meter{height:30px;background:#444;border-radius:20px;overflow:hidden;margin:20px 0}
#fill{height:100%;width:0;background:lime;transition:.05s}
#status{font-size:28px;margin:15px}
#monster{font-size:90px}
</style>
</head>
<body>
<div class="card">
<h1>👾 Don't Wake the Monster! V2</h1>
<div id="monster">👽</div>
<p id="mission">Press Start Listening</p>
<button onclick="start()">Start Listening</button>
<div id="meter"><div id="fill"></div></div>
<p id="status">Idle</p>
<p>Threshold: <span id="thr">-</span></p>
</div>

<script>
let ctx, analyser, data, baseline=0, threshold=0, listening=false,last=0,strikes=0;

async function start(){
 document.getElementById("status").textContent="Allow microphone...";
 const stream=await navigator.mediaDevices.getUserMedia({audio:true});
 ctx=new(window.AudioContext||window.webkitAudioContext)();
 analyser=ctx.createAnalyser();
 analyser.fftSize=1024;
 data=new Float32Array(analyser.fftSize);
 ctx.createMediaStreamSource(stream).connect(analyser);

 let samples=[];
 let startTime=performance.now();

 function calibrate(){
   analyser.getFloatTimeDomainData(data);
   let rms=getRMS();
   samples.push(rms);
   if(performance.now()-startTime<5000){
      requestAnimationFrame(calibrate);
   }else{
      baseline=samples.reduce((a,b)=>a+b)/samples.length;
      threshold=baseline*4.5;
      document.getElementById("thr").textContent=threshold.toFixed(4);
      document.getElementById("status").textContent="Listening...";
      listening=true;
      loop();
   }
 }
 calibrate();
}

function getRMS(){
 let s=0;
 for(let i=0;i<data.length;i++) s+=data[i]*data[i];
 return Math.sqrt(s/data.length);
}

function loop(){
 analyser.getFloatTimeDomainData(data);
 let rms=getRMS();
 let pct=Math.min(100,(rms/(threshold*1.5))*100);
 document.getElementById("fill").style.width=pct+"%";
 if(listening && rms>threshold && performance.now()-last>1500){
    last=performance.now();
    strikes++;
    if(strikes==1) document.getElementById("status").textContent="👂 I heard something...";
    else if(strikes==2) document.getElementById("status").textContent="😠 I know you're there...";
    else{
      document.getElementById("status").textContent="👹 I FOUND YOU!";
      listening=false;
      return;
    }
 }
 requestAnimationFrame(loop);
}
</script>
</body>
</html>
